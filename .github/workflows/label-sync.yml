name: Sync Labels

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync labels
        uses: actions-ecosystem/action-sync-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          configuration_path: .github/labels.yml
