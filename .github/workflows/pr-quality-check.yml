name: 🔍 PR Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 📥 Checkout with full history (useful for diff-based tools later)
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🐍 Setup Python with caching
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ⚡ Setup uv (fast Python package manager)
      - name: ⚡ Setup uv
        uses: astral-sh/setup-uv@v7

      # 📦 Install dependencies (auto-detects pyproject.toml)
      - name: 📦 Install dependencies
        run: |
          uv sync --all-extras --dev

      # 🔍 Lint (fail fast)
      - name: 🔍 Ruff Lint
        run: |
          uv run ruff check src/ctxai tests --output-format=github

      # 🎨 Optional: Format check (non-blocking suggestion)
      - name: 🎨 Ruff Format Check
        run: |
          uv run ruff format --check src/ctxai tests

      # 🧪 Run tests with better output
      - name: 🧪 Run Tests
        run: |
          uv run pytest tests \
            --maxfail=1 \
            --disable-warnings \
            -q

      # 📊 Optional: Coverage (can be enforced later)
      - name: 📊 Coverage Report
        run: |
          uv run pytest --cov=src/ctxai --cov-report=term-missing
