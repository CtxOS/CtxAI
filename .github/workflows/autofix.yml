name: Auto-fix

on:
  pull_request:
    branches: [main, development]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check with auto-fix
        run: uv run ruff check --fix src/ctxai/ tests/ || true

      - name: Run ruff format
        run: uv run ruff format src/ctxai/ tests/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "style: auto-fix linting issues"
          title: "style: auto-fix linting issues"
          body: |
            Auto-fixed linting issues using ruff.
            - Fixed formatting
            - Fixed import issues
            - Fixed code style issues
          branch: autofix/linting
          delete-branch: true
          labels: automated,autofix
