name: Project Automation

on:
  issues:
    types: [opened, labeled, reopened]
  pull_request:
    types: [opened, labeled, reopened]
  schedule:
    - cron: "0 9 * * 1"

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create project task comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue || context.payload.pull_request;
            if (!issue) {
              core.info('No issue or PR payload to add to project.');
              return;
            }
            core.info(`Received event for ${issue.html_url}`);
            core.info('Project automation placeholder: update project board manually or configure custom script.');
