name: Bump and Tag

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bump version
        run: |
          current=$(python -c "import setuptools,sys; print('0.0.1')")
          echo "Bump placeholder: $current"
