# Standard labels for CtxAI
# These labels are used by issue workflows and can be synced via actions.

- name: area:agent
  color: ffbf00
  description: Code for agent orchestration and runtime
- name: area:api
  color: 0e8a16
  description: API or backend HTTP changes
- name: area:plugins
  color: 2f5d9f
  description: Plugin framework and plugin features
- name: area:webui
  color: 5319e7
  description: Frontend web UI changes
- name: area:docs
  color: 0075ca
  description: Documentation updates
- name: type:bug
  color: d73a4a
  description: Bug fixes
- name: type:enhancement
  color: a2eeef
  description: New feature or improvement
- name: type:maintenance
  color: cfd3d7
  description: Dependency updates, cleanup
- name: status:needs triage
  color: e99695
  description: Needs initial triage
- name: status:ready
  color: 0e8a16
  description: Ready for work
- name: status:blocked
  color: f9d0c4
  description: Blocked by unresolved issue
- name: good first issue
  color: 7057ff
  description: Good first issue for new contributors
