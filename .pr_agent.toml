[config]
model = "gpt-4o"
enable_auto_review = true
enable_pr_summary = true
enable_unit_tests_suggestions = true
enable_security_analysis = true
enable_improve_suggestions = true
enable_recent_issues_scan = false
num_code_suggestions = 5
review_level = "medium"
extra_instructions = """
Focus on:
- Security: input validation, auth, CSRF, injection
- Performance: async patterns, memory leaks, resource limits
- Architecture: clean layering, separation of concerns
- Tests: coverage of new code, isolation
"""
exclude_patterns = [
    "src/ctxai/usr/**",
    "docs/release-notes.md",
]
